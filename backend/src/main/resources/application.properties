spring.application.name=backend

# DB 접속 설정
spring.datasource.url=jdbc:mysql://localhost:3306/algolist
spring.datasource.username=root
spring.datasource.password=ssafy
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# mapper 파일 경로 설정
mybatis.mapper-locations=classpath:mappers/*.xml

# 별칭 참조를 위한 패키지 지정
mybatis.type-aliases-package=com.algolist.backend.problem,com.algolist.backend.solution,com.algolist.backend.user.dto,com.algolist.backend.user.dto.response

# multipart 파일 업로드 제한
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=3MB

# 민감 정보는 application-secret.properties에서 관리 (.gitignore 적용)
spring.config.import=optional:classpath:application-secret.properties


# <Spring Batch>
# Boot 기본 자동 실행은 끔(false). 실행은 CodeforcesIngestStartupRunner 가 startNextInstance 로 직접 띄운다.
# (기본 자동실행은 incrementer 미적용이라 재시동 시 "이미 완료된 인스턴스" 예외가 남)
spring.batch.job.enabled=false
# Spring Batch 메타데이터 테이블 자동 생성 설정
spring.batch.jdbc.initialize-schema=always

# (배치 메타데이터 BATCH_* 테이블은 algolist DB에 함께 생성됨 — 데이터소스 분리 안 함)

# 코드포스 수집 배치 (앱 시작 시 1회, 한 실행에서 전량 적재)
# page-size = 허깅페이스 API 1회 요청 개수(상한 100) 겸 청크 크기 (둘은 같아야 offset 체크포인트가 정합)
codeforces.batch.page-size=100
# 파싱 실패(skip)를 이만큼까지 허용. 초과하면 스텝 실패(체계적 오류 감지용 안전장치)
codeforces.batch.skip-limit=1000
# 페이지 요청 사이 지연(ms) — 허깅페이스 rate limit 예방. 0이면 지연 없음
codeforces.batch.request-delay-ms=300
# 일시 HTTP 오류(502/5xx, 429) 시 페이지 요청 재시도 횟수 (backoff 적용)
codeforces.batch.max-retries=3
# 재시도까지 실패한 페이지를 기록·건너뛸 때, 연속 실패가 이 수를 넘으면 체계적 장애로 보고 스텝 중단
codeforces.batch.max-consecutive-skips=5
# 앱 시작 시 배치 자동 실행 여부. 개발 중 잦은 재시작으로 배치가 자꾸 도는 게 싫으면 false
codeforces.batch.run-on-startup=true

# devtools 자동 재시작 끄기 — 클래스(재빌드) 변경 때마다 앱이 재시작되어 배치를 중단시키는 것 방지.
# (웹 핫리로드가 필요할 때만 true. 배치 적재 중엔 false 권장)
spring.devtools.restart.enabled=false