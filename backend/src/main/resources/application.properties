spring.application.name=backend

# 비즈니스 DB 접속 설정
spring.datasource.jdbc-url=jdbc:mysql://${DB_HOST:localhost}:3306/algolist
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:ssafy}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# batch_system DB 접속 설정
spring.datasource.batch-system.jdbc-url=jdbc:mysql://${DB_HOST:localhost}:3306/batch_system
spring.datasource.batch-system.username=${DB_USERNAME:root}
spring.datasource.batch-system.password=${DB_PASSWORD:ssafy}
spring.datasource.batch-system.driver-class-name=com.mysql.cj.jdbc.Driver

# mapper 파일 경로 설정
mybatis.mapper-locations=classpath:mappers/*.xml

# 별칭 참조를 위한 패키지 지정
mybatis.type-aliases-package=com.algolist.backend.problem,com.algolist.backend.solution,com.algolist.backend.user.dto,com.algolist.backend.user.dto.response

# multipart 파일 업로드 제한
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=3MB

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${gmail.smtp.username:}
spring.mail.password=${gmail.smtp.app-password:}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# 세션 쿠키 보안 설정
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
# server.servlet.session.cookie.secure=true

# 세션 유지시간 설정
server.servlet.session.timeout=30m

# 민감 정보는 application-secret.properties에서 관리 (.gitignore 적용)
spring.config.import=optional:classpath:application-secret.properties


# <Spring Batch>
# Boot 기본 자동 실행은 끔(false). 실행은 관리자 트리거(AdminBatchController → CodeforcesIngestLauncher)로만 한다.
# (이 설정을 빼면 Boot 가 기동 시 Job 을 빈 파라미터로 자동 실행해버리므로 반드시 false 유지)
spring.batch.job.enabled=false
# Spring Batch 메타데이터 테이블 자동 생성 설정
spring.batch.jdbc.initialize-schema=always

# 배치 메타데이터 BATCH_* 테이블은 batch_system DB에 생성 (데이터소스 분리)

# 코드포스 수집 배치 (관리자 트리거로 실행, 한 실행에서 전량 적재)
# page-size = 허깅페이스 API 1회 요청 개수(상한 100) 겸 청크 크기 (둘은 같아야 offset 체크포인트가 정합)
codeforces.batch.page-size=100
# 파싱 실패(skip)를 이만큼까지 허용. 초과하면 스텝 실패(체계적 오류 감지용 안전장치)
codeforces.batch.skip-limit=1000
# 페이지 요청 사이 지연(ms) — 허깅페이스 rate limit 예방. 0이면 지연 없음
codeforces.batch.request-delay-ms=300
# 일시 HTTP 오류(502/5xx, 429) 시 페이지 요청 재시도 횟수 (backoff 적용)
codeforces.batch.max-retries=3
# 재시도까지 실패한 페이지를 기록·건너뛸 때, 연속 실패가 이 수를 넘으면 체계적 장애로 보고 스텝 중단
codeforces.batch.max-consecutive-skips=5


# <Spring AI>
# SSAFY GMS (application-secret에 있음)

# Spring AI OpenAI (번역용)
spring.ai.openai.api-key=${ssafy.gms.api-key}
spring.ai.openai.base-url=https://gms.ssafy.io/gmsapi/api.openai.com/v1/
spring.ai.openai.chat.completions-path=chat/completions
spring.ai.openai.chat.options.model=gpt-5-nano

# 사용하지 않는 OpenAI 모델 자동 구성 비활성화
spring.ai.openai.audio.speech.enabled=false
spring.ai.openai.audio.transcription.enabled=false
spring.ai.openai.image.enabled=false
spring.ai.openai.embedding.enabled=false

# 번역 서비스 로깅
logging.level.com.algolist.backend.problem.translation=DEBUG

# devtools 자동 재시작 끄기 — 클래스(재빌드) 변경 때마다 앱이 재시작되어 배치를 중단시키는 것 방지.
# (웹 핫리로드가 필요할 때만 true. 배치 적재 중엔 false 권장)
spring.devtools.restart.enabled=false
